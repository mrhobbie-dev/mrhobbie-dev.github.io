<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      #gallery {
        padding-top: 40px;
        @media screen and (min-width: 991px) {
          padding: 60px 30px 0 30px;
        }
      }

      .img-wrapper {
        position: relative;
        margin-top: 15px;
        img {
          width: 100%;
        }
      }
      .img-overlay {
        background: rgba(0, 0, 0, 0.7);
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        opacity: 0;
        i {
          color: #fff;
          font-size: 3em;
        }
      }

      #overlay {
        background: rgba(0, 0, 0, 0.7);
        width: 100%;
        height: 100%;
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;

        img {
          margin: 0;
          width: 80%;
          height: auto;
          object-fit: contain;
          padding: 5%;
          @media screen and (min-width: 768px) {
            width: 60%;
          }
          @media screen and (min-width: 1200px) {
            width: 50%;
          }
        }
      }

      #nextButton {
        color: #fff;
        font-size: 2em;
        transition: opacity 0.8s;
        &:hover {
          opacity: 0.7;
        }
        @media screen and (min-width: 768px) {
          font-size: 3em;
        }
      }

      #prevButton {
        color: #fff;
        font-size: 2em;
        transition: opacity 0.8s;
        &:hover {
          opacity: 0.7;
        }
        @media screen and (min-width: 768px) {
          font-size: 3em;
        }
      }

      #exitButton {
        color: #fff;
        font-size: 2em;
        transition: opacity 0.8s;
        position: absolute;
        top: 15px;
        right: 15px;
        &:hover {
          opacity: 0.7;
        }
        @media screen and (min-width: 768px) {
          font-size: 3em;
        }
      }
    </style>
  </head>
  <body>
    <section id="gallery">
      <div class="container">
        <div id="image-gallery">
          <div class="row">
            <h6>A sample of available FORMS</h6>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="fullpage.png"
                  ><img src="fullpage.png" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/600"
                  ><img src="https://unsplash.it/600" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/700"
                  ><img src="https://unsplash.it/700" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
        </div> 
        <div class="row">
        <h6>New Images</h6>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/800"
                  ><img src="https://unsplash.it/800" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/900"
                  ><img src="https://unsplash.it/900" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/1000"
                  ><img src="https://unsplash.it/1000" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/1100"
                  ><img src="https://unsplash.it/1100" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
            <div class="col-lg-3 col-md-6 col-sm-6 col-xs-12 image">
              <div class="img-wrapper">
                <a href="https://unsplash.it/1200"
                  ><img src="https://unsplash.it/1200" class="img-responsive"
                /></a>
                <div class="img-overlay">
                  <i class="fa fa-plus-circle" aria-hidden="true"></i>
                </div>
              </div>
            </div>
          </div>
          <!-- End row -->
        </div>
        <!-- End image gallery -->
      </div>
      <!-- End container -->
    </section>

    <script
      src="https://code.jquery.com/jquery-4.0.0.min.js"
      integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script>
      // Gallery image hover
      $(".img-wrapper").hover(
        function () {
          $(this).find(".img-overlay").animate({ opacity: 1 }, 600);
        },
        function () {
          $(this).find(".img-overlay").animate({ opacity: 0 }, 600);
        },
      );

      // Lightbox
      var $overlay = $('<div id="overlay"></div>');
      var $image = $("<img>");
      var $prevButton = $(
        '<div id="prevButton"><i class="fa fa-chevron-left"></i></div>',
      );
      var $nextButton = $(
        '<div id="nextButton"><i class="fa fa-chevron-right"></i></div>',
      );
      var $exitButton = $(
        '<div id="exitButton"><i class="fa fa-times"></i></div>',
      );

      // Add overlay
      $overlay
        .append($image)
        .prepend($prevButton)
        .append($nextButton)
        .append($exitButton);
      $("#gallery").append($overlay);

      // Hide overlay on default
      $overlay.hide();

      // When an image is clicked
      $(".img-overlay").click(function (event) {
        // Prevents default behavior
        event.preventDefault();
        // Adds href attribute to variable
        var imageLocation = $(this).prev().attr("href");
        // Add the image src to $image
        $image.attr("src", imageLocation);
        // Fade in the overlay
        $overlay.fadeIn("slow");
      });

      // When the overlay is clicked
      $overlay.click(function () {
        // Fade out the overlay
        $(this).fadeOut("slow");
      });

      // When next button is clicked
      $nextButton.click(function (event) {
        // Hide the current image
        $("#overlay img").hide();
        // Overlay image location
        var $currentImgSrc = $("#overlay img").attr("src");
        // Image with matching location of the overlay image
        var $currentImg = $('#image-gallery img[src="' + $currentImgSrc + '"]');
        // Finds the next image
        var $nextImg = $($currentImg.closest(".image").next().find("img"));
        // All of the images in the gallery
        var $images = $("#image-gallery img");
        // If there is a next image
        if ($nextImg.length > 0) {
          // Fade in the next image
          $("#overlay img").attr("src", $nextImg.attr("src")).fadeIn(800);
        } else {
          // Otherwise fade in the first image
          $("#overlay img").attr("src", $($images[0]).attr("src")).fadeIn(800);
        }
        // Prevents overlay from being hidden
        event.stopPropagation();
      });

      // When previous button is clicked
      $prevButton.click(function (event) {
        // Hide the current image
        $("#overlay img").hide();
        // Overlay image location
        var $currentImgSrc = $("#overlay img").attr("src");
        // Image with matching location of the overlay image
        var $currentImg = $('#image-gallery img[src="' + $currentImgSrc + '"]');
        // Finds the next image
        var $nextImg = $($currentImg.closest(".image").prev().find("img"));
        // Fade in the next image
        $("#overlay img").attr("src", $nextImg.attr("src")).fadeIn(800);
        // Prevents overlay from being hidden
        event.stopPropagation();
      });

      // When the exit button is clicked
      $exitButton.click(function () {
        // Fade out the overlay
        $("#overlay").fadeOut("slow");
      });
    </script>
  </body>
</html>
